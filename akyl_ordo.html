<!DOCTYPE html>
<html lang="ky">

<head>
    <meta charset="UTF-8" />

    <title>Акыл Ордо — Интеллектуальная игра</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
                        accent: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }
                    },
                    animation: {
                        'flip-in': 'flipIn 0.6s ease-out forwards',
                        'flip-out': 'flipOut 0.4s ease-in forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                        'bounce-in': 'bounceIn 0.5s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'shake': 'shake 0.5s ease-in-out',
                        'confetti-fall': 'confettiFall 3s ease-in forwards',
                        'timer-pulse': 'timerPulse 1s ease-in-out infinite',
                        'card-reveal': 'cardReveal 0.6s cubic-bezier(0.4,0,0.2,1) forwards',
                    },
                    keyframes: {
                        flipIn: { '0%': { transform: 'rotateY(180deg)', opacity: '0' }, '100%': { transform: 'rotateY(0)', opacity: '1' } },
                        flipOut: { '0%': { transform: 'rotateY(0)', opacity: '1' }, '100%': { transform: 'rotateY(180deg)', opacity: '0' } },
                        pulseGlow: { '0%,100%': { boxShadow: '0 0 20px rgba(99,102,241,0.3)' }, '50%': { boxShadow: '0 0 40px rgba(99,102,241,0.6)' } },
                        slideUp: { '0%': { transform: 'translateY(30px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        slideDown: { '0%': { transform: 'translateY(-20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        bounceIn: { '0%': { transform: 'scale(0.3)', opacity: '0' }, '50%': { transform: 'scale(1.05)' }, '70%': { transform: 'scale(0.9)' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        shake: { '0%,100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(-5px)' }, '75%': { transform: 'translateX(5px)' } },
                        confettiFall: { '0%': { transform: 'translateY(-100vh) rotate(0deg)', opacity: '1' }, '100%': { transform: 'translateY(100vh) rotate(720deg)', opacity: '0' } },
                        timerPulse: { '0%,100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.1)' } },
                        cardReveal: { '0%': { transform: 'rotateY(180deg)', opacity: '0' }, '60%': { transform: 'rotateY(-10deg)' }, '100%': { transform: 'rotateY(0)', opacity: '1' } },
                    }
                }
            }
        }
    </script>

        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }

        .text-gradient {
            background: linear-gradient(135deg, #86efac, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glow-btn {
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.4), inset 0 0 30px rgba(34, 197, 94, 0.1);
            transition: all 0.3s ease;
        }

        .glow-btn:hover {
            box-shadow: 0 0 50px rgba(34, 197, 94, 0.6), inset 0 0 50px rgba(34, 197, 94, 0.2);
            transform: translateY(-2px);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .timer-warning {
            animation: timerPulse 0.5s ease-in-out infinite;
            color: #ef4444;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in forwards;
            z-index: 60;
        }

        .glass-green-dark {
            background: rgba(13, 32, 13, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(20, 51, 20, 0.5);
        }

        .glass-green-light {
            background: rgba(200, 220, 192, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(176, 204, 159, 0.4);
        }
    </style>
</head>

<body class="dark min-h-screen transition-colors duration-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ==================== SOUND ENGINE ====================
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.tickInterval = null;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }

            playTick() {
                if (!this.ctx) this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.05);
            }

            playEnd() {
                if (!this.ctx) this.init();
                const playNote = (freq, start, dur) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime + start);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + start + dur);
                    osc.start(this.ctx.currentTime + start);
                    osc.stop(this.ctx.currentTime + start + dur);
                };
                playNote(880, 0, 0.2);
                playNote(880, 0.2, 0.2);
                playNote(880, 0.4, 0.2);
                playNote(660, 0.7, 0.4);
            }

            playCorrect() {
                if (!this.ctx) this.init();
                const playNote = (freq, start, dur) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.12, this.ctx.currentTime + start);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + start + dur);
                    osc.start(this.ctx.currentTime + start);
                    osc.stop(this.ctx.currentTime + start + dur);
                };
                playNote(523, 0, 0.15);
                playNote(659, 0.15, 0.15);
                playNote(784, 0.3, 0.3);
            }

            playWrong() {
                if (!this.ctx) this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.value = 200;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.3);
            }

            startTicking(intervalMs = 1000) {
                this.init();
                this.stopTicking();
                this.playTick();
                this.tickInterval = setInterval(() => this.playTick(), intervalMs);
            }

            stopTicking() {
                if (this.tickInterval) {
                    clearInterval(this.tickInterval);
                    this.tickInterval = null;
                }
            }

            playClick() {
                if (!this.ctx) this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.value = 600;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.03);
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + 0.03);
            }
        }

        const soundEngine = new SoundEngine();

        // ==================== DEFAULT QUESTIONS ====================
        const DEFAULT_QUESTIONS = [
            { id: 1, text: "Какая планета является ближайшей к Солнцу?", answer: "Меркурий" },
            { id: 2, text: "Столица Франции?", answer: "Париж" },
            { id: 3, text: "Сколько континентов на Земле?", answer: "6 (или 7)" },
            { id: 4, text: "Кто написал 'Войну и мир'?", answer: "Лев Толстой" },
            { id: 5, text: "Химический символ золота?", answer: "Au" },
            { id: 6, text: "Самый большой океан?", answer: "Тихий" },
            { id: 7, text: "В каком году человек впервые полетел в космос?", answer: "1961" },
            { id: 8, text: "Сколько сторон у куба?", answer: "6" },
            { id: 9, text: "Какой газ составляет основу атмосферы Земли?", answer: "Азот (N₂)" },
            { id: 10, text: "Столица Кыргызстана?", answer: "Бишкек" },
            { id: 11, text: "Самое глубокое озеро в мире?", answer: "Байкал" },
            { id: 12, text: "Кто изобрёл лампочку?", answer: "Томас Эдисон" },
        ];

        const DEFAULT_SETTINGS = {
            teamCount: 3,
            questionTime: 30,
            questions: DEFAULT_QUESTIONS,
        };

        // ==================== LOCAL STORAGE ====================
        function loadSettings() {
            try {
                const saved = localStorage.getItem('akyldOrdo_settings');
                return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : DEFAULT_SETTINGS;
            } catch { return DEFAULT_SETTINGS; }
        }

        function saveSettings(settings) {
            localStorage.setItem('akyldOrdo_settings', JSON.stringify(settings));
        }

        // ==================== ICONS ====================
        const Icons = {
            Settings: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            ),
            Sun: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            ),
            Moon: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            ),
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            ),
            Trash: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            ),
            Edit: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            ),
            Check: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            ),
            X: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            ),
            Back: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m7 7l-7 7m0 0l7-7" />
                </svg>
            ),
            Trophy: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-4.5A3.378 3.378 0 0019.875 10.875 3.378 3.378 0 0016.5 7.5V3.75m-9 15v-4.5A3.378 3.378 0 014.125 10.875 3.378 3.378 0 017.5 7.5V3.75m9 0h-9m9 0a1.5 1.5 0 011.5 1.5m-10.5-1.5a1.5 1.5 0 00-1.5 1.5" />
                </svg>
            ),
            Play: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
            ),
            Reset: () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            ),
        };

        // ==================== THEME TOGGLE BUTTON (REUSABLE) ====================
        function ThemeToggle({ darkMode, toggleDarkMode }) {
            return (
                <button
                    onClick={toggleDarkMode}
                    className={`p-3 rounded-xl transition-all duration-300 hover:scale-110 ${darkMode
                            ? 'glass-green-dark text-yellow-300 hover:bg-white/10'
                            : 'glass-green-light text-green-700 hover:bg-green-200'
                        }`}
                    title={darkMode ? 'Светлая тема' : 'Тёмная тема'}
                >
                    {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                </button>
            );
        }

        // ==================== HOME PAGE ====================
        function HomePage({ onStart, onSettings, darkMode, toggleDarkMode }) {
            return (
                <div className={`min-h-screen relative overflow-hidden ${darkMode ? 'wa-bg-dark' : 'wa-bg-light'} flex items-center justify-center`}>
                    {/* Decorative floating elements */}
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        <div className={`absolute top-20 left-20 w-72 h-72 rounded-full blur-3xl ${darkMode ? 'bg-green-600/10' : 'bg-green-300/30'} float-animation`} />
                        <div className={`absolute bottom-20 right-20 w-96 h-96 rounded-full blur-3xl ${darkMode ? 'bg-emerald-600/10' : 'bg-emerald-300/20'}`} style={{ animation: 'float 4s ease-in-out infinite reverse' }} />
                        <div className={`absolute top-1/2 left-1/4 w-48 h-48 rounded-full blur-3xl ${darkMode ? 'bg-teal-600/5' : 'bg-teal-300/20'}`} style={{ animation: 'float 5s ease-in-out infinite' }} />
                    </div>

                    {/* Top right controls */}
                    <div className="absolute top-4 right-4 flex items-center gap-3 z-10">
                        <ThemeToggle darkMode={darkMode} toggleDarkMode={toggleDarkMode} />
                        <button
                            onClick={() => { soundEngine.playClick(); onSettings(); }}
                            className={`p-3 rounded-xl transition-all duration-300 hover:scale-110 ${darkMode ? 'glass-green-dark text-green-300 hover:bg-white/10' : 'glass-green-light text-green-700 hover:bg-green-200'
                                }`}
                        >
                            <Icons.Settings />
                        </button>
                    </div>

                    {/* Main content */}
                    <div className="relative z-10 text-center px-4">
                        <div className="mb-8 animate-bounce-in">
                            <div className={`text-8xl md:text-9xl font-black tracking-tight mb-2`}>
                                <span className="text-gradient">Акыл</span>
                            </div>
                            <div className={`text-5xl md:text-7xl font-black tracking-tight`}>
                                <span className="text-gradient">Ордо</span>
                            </div>
                        </div>

                        <p className={`text-lg md:text-xl mb-12 font-light tracking-wide ${darkMode ? 'text-green-300/70' : 'text-green-800/70'}`}>
                            Интеллектуальная битва знаний ✨
                        </p>

                        <button
                            onClick={() => { soundEngine.init(); soundEngine.playClick(); onStart(); }}
                            className="group relative px-12 py-5 rounded-2xl text-xl md:text-2xl font-bold text-white transition-all duration-500 glow-btn bg-green-600 hover:bg-green-500"
                        >
                            <span className="relative z-10 flex items-center gap-3">
                                <Icons.Play />
                                Начать битву
                            </span>
                            <div className="absolute inset-0 rounded-2xl bg-gradient-to-r from-green-500 via-emerald-500 to-teal-500 opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
                        </button>

                        <p className={`mt-8 text-sm ${darkMode ? 'text-green-400/50' : 'text-green-600/50'}`}>
                            Собери команду • Ответь на вопросы • Победи!
                        </p>
                    </div>
                </div>
            );
        }

        // ==================== ADMIN PAGE ====================
        function AdminPage({ settings, onSave, onBack, darkMode, toggleDarkMode }) {
            const [teamCount, setTeamCount] = useState(settings.teamCount);
            const [questionTime, setQuestionTime] = useState(settings.questionTime);
            const [questions, setQuestions] = useState([...settings.questions]);
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState({ text: '', answer: '' });
            const [showAddForm, setShowAddForm] = useState(false);
            const [newQuestion, setNewQuestion] = useState({ text: '', answer: '' });
            const [saved, setSaved] = useState(false);

            const handleSave = () => {
                const newSettings = { teamCount, questionTime, questions };
                saveSettings(newSettings);
                onSave(newSettings);
                setSaved(true);
                soundEngine.playCorrect();
                setTimeout(() => setSaved(false), 2000);
            };

            const addQuestion = () => {
                if (!newQuestion.text.trim()) return;
                const id = Math.max(0, ...questions.map(q => q.id)) + 1;
                setQuestions([...questions, { id, text: newQuestion.text, answer: newQuestion.answer }]);
                setNewQuestion({ text: '', answer: '' });
                setShowAddForm(false);
                soundEngine.playClick();
            };

            const deleteQuestion = (id) => {
                setQuestions(questions.filter(q => q.id !== id));
                soundEngine.playClick();
            };

            const startEdit = (q) => {
                setEditingId(q.id);
                setEditForm({ text: q.text, answer: q.answer });
            };

            const saveEdit = () => {
                setQuestions(questions.map(q => q.id === editingId ? { ...q, ...editForm } : q));
                setEditingId(null);
                setEditForm({ text: '', answer: '' });
                soundEngine.playClick();
            };

            const inputClass = `w-full px-4 py-3 rounded-xl border-2 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 ${darkMode ? 'bg-white/5 border-white/10 text-white placeholder-gray-500 focus:border-green-400' : 'bg-white border-gray-200 text-gray-900 placeholder-gray-400 focus:border-green-500'
                }`;

            return (
                <div className={`min-h-screen ${darkMode ? 'wa-bg-dark' : 'wa-bg-light'} p-4 md:p-8`}>
                    <div className="max-w-4xl mx-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8">
                            <button
                                onClick={() => { soundEngine.playClick(); onBack(); }}
                                className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-200 hover:scale-105 ${darkMode ? 'glass-green-dark text-white' : 'glass-green-light text-green-900'
                                    }`}
                            >
                                <Icons.Back /> Назад
                            </button>
                            <h1 className={`text-2xl md:text-3xl font-bold ${darkMode ? 'text-white' : 'text-green-900'}`}>
                                ⚙️ Настройки
                            </h1>
                            <div className="flex items-center gap-3">
                                <ThemeToggle darkMode={darkMode} toggleDarkMode={toggleDarkMode} />
                                <button
                                    onClick={() => { soundEngine.playClick(); handleSave(); }}
                                    className={`px-6 py-2 rounded-xl font-semibold transition-all duration-200 hover:scale-105 ${saved ? 'bg-green-500 text-white' : 'bg-green-600 text-white hover:bg-green-500'
                                        }`}
                                >
                                    {saved ? '✓ Сохранено!' : 'Сохранить'}
                                </button>
                            </div>
                        </div>

                        {/* Settings */}
                        <div className={`rounded-2xl p-6 mb-6 ${darkMode ? 'glass-green-dark' : 'glass-green-light'}`}>
                            <h2 className={`text-xl font-bold mb-4 ${darkMode ? 'text-white' : 'text-green-900'}`}>Основные настройки</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                        Количество команд
                                    </label>
                                    <input
                                        type="number"
                                        min="2"
                                        max="10"
                                        value={teamCount}
                                        onChange={e => setTeamCount(Math.min(10, Math.max(2, parseInt(e.target.value) || 2)))}
                                        className={inputClass}
                                    />
                                </div>
                                <div>
                                    <label className={`block text-sm font-medium mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                        Время на вопрос (секунды)
                                    </label>
                                    <input
                                        type="number"
                                        min="10"
                                        max="120"
                                        value={questionTime}
                                        onChange={e => setQuestionTime(Math.min(120, Math.max(10, parseInt(e.target.value) || 10)))}
                                        className={inputClass}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Questions */}
                        <div className={`rounded-2xl p-6 mb-6 ${darkMode ? 'glass-green-dark' : 'glass-green-light'}`}>
                            <div className="flex items-center justify-between mb-4">
                                <h2 className={`text-xl font-bold ${darkMode ? 'text-white' : 'text-green-900'}`}>
                                    📝 Вопросы ({questions.length})
                                </h2>
                                <button
                                    onClick={() => { soundEngine.playClick(); setShowAddForm(!showAddForm); }}
                                    className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-xl hover:bg-green-500 transition-all duration-200 hover:scale-105"
                                >
                                    <Icons.Plus /> Добавить
                                </button>
                            </div>

                            {showAddForm && (
                                <div className={`p-4 rounded-xl mb-4 animate-slide-down ${darkMode ? 'bg-white/5' : 'bg-green-50'}`}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                                        <input
                                            placeholder="Текст вопроса"
                                            value={newQuestion.text}
                                            onChange={e => setNewQuestion({ ...newQuestion, text: e.target.value })}
                                            className={inputClass}
                                        />
                                        <input
                                            placeholder="Правильный ответ"
                                            value={newQuestion.answer}
                                            onChange={e => setNewQuestion({ ...newQuestion, answer: e.target.value })}
                                            className={inputClass}
                                        />
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={addQuestion} className="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-400 transition-colors">
                                            Добавить
                                        </button>
                                        <button onClick={() => setShowAddForm(false)} className={`px-4 py-2 rounded-lg transition-colors ${darkMode ? 'bg-white/10 text-gray-300' : 'bg-gray-200 text-gray-600'}`}>
                                            Отмена
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="space-y-3 max-h-96 overflow-y-auto pr-2">
                                {questions.map((q, idx) => (
                                    <div key={q.id} className={`p-4 rounded-xl transition-all duration-200 ${darkMode ? 'bg-white/5 hover:bg-white/8' : 'bg-white/60 hover:bg-white/80'
                                        }`}>
                                        {editingId === q.id ? (
                                            <div className="space-y-3">
                                                <input value={editForm.text} onChange={e => setEditForm({ ...editForm, text: e.target.value })} className={inputClass} />
                                                <input value={editForm.answer} onChange={e => setEditForm({ ...editForm, answer: e.target.value })} className={inputClass} />
                                                <div className="flex gap-2">
                                                    <button onClick={saveEdit} className="px-3 py-1.5 bg-green-500 text-white rounded-lg text-sm">Сохранить</button>
                                                    <button onClick={() => setEditingId(null)} className={`px-3 py-1.5 rounded-lg text-sm ${darkMode ? 'bg-white/10 text-gray-300' : 'bg-gray-200 text-gray-600'}`}>Отмена</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-start justify-between gap-3">
                                                <div className="flex-1">
                                                    <span className={`inline-block text-xs font-bold px-2 py-0.5 rounded-md mb-1 ${darkMode ? 'bg-green-600/30 text-green-300' : 'bg-green-100 text-green-600'}`}>
                                                        #{idx + 1}
                                                    </span>
                                                    <p className={`font-medium ${darkMode ? 'text-white' : 'text-gray-800'}`}>{q.text}</p>
                                                    <p className={`text-sm mt-1 ${darkMode ? 'text-green-400' : 'text-green-600'}`}>Ответ: {q.answer}</p>
                                                </div>
                                                <div className="flex gap-1 shrink-0">
                                                    <button onClick={() => startEdit(q)} className={`p-2 rounded-lg transition-colors ${darkMode ? 'hover:bg-white/10 text-gray-400' : 'hover:bg-green-100 text-gray-500'}`}>
                                                        <Icons.Edit />
                                                    </button>
                                                    <button onClick={() => deleteQuestion(q.id)} className="p-2 rounded-lg hover:bg-red-500/20 text-red-400 transition-colors">
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== TEAM SETUP MODAL ====================
        function TeamSetupModal({ teamCount, onConfirm, darkMode, toggleDarkMode }) {
            const [teams, setTeams] = useState(Array(teamCount).fill('').map((_, i) => `Команда ${i + 1}`));

            const handleConfirm = () => {
                const named = teams.map((t, i) => t.trim() || `Команда ${i + 1}`);
                soundEngine.playClick();
                onConfirm(named);
            };

            return (
                <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in ${darkMode ? 'wa-bg-dark' : 'wa-bg-light'}`}>
                    {/* Theme toggle in modal */}
                    <div className="absolute top-4 right-4 z-10">
                        <ThemeToggle darkMode={darkMode} toggleDarkMode={toggleDarkMode} />
                    </div>

                    <div className={`w-full max-w-lg rounded-3xl p-8 animate-bounce-in ${darkMode ? 'glass-green-dark' : 'glass-green-light'}`}>
                        <h2 className={`text-3xl font-bold text-center mb-2 ${darkMode ? 'text-white' : 'text-green-900'}`}>
                            🏆 Команды
                        </h2>
                        <p className={`text-center mb-6 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Введите названия команд</p>

                        <div className="space-y-3 mb-6">
                            {teams.map((team, i) => (
                                <div key={i} className="flex items-center gap-3">
                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${darkMode ? 'bg-green-600/30 text-green-300' : 'bg-green-100 text-green-600'
                                        }`}>
                                        {i + 1}
                                    </span>
                                    <input
                                        value={team}
                                        onChange={e => {
                                            const newTeams = [...teams];
                                            newTeams[i] = e.target.value;
                                            setTeams(newTeams);
                                        }}
                                        placeholder={`Название команды ${i + 1}`}
                                        className={`flex-1 px-4 py-3 rounded-xl border-2 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 ${darkMode ? 'bg-white/5 border-white/10 text-white placeholder-gray-500 focus:border-green-400' : 'bg-white border-gray-200 text-gray-900 placeholder-gray-400 focus:border-green-500'
                                            }`}
                                    />
                                </div>
                            ))}
                        </div>

                        <button
                            onClick={handleConfirm}
                            className="w-full py-4 bg-green-600 hover:bg-green-500 text-white rounded-xl text-lg font-bold transition-all duration-300 hover:scale-[1.02] glow-btn"
                        >
                            Начать игру! 🚀
                        </button>
                    </div>
                </div>
            );
        }

        // ==================== QUESTION CARD MODAL (WIDER) ====================
        function QuestionCardModal({ question, teams, scores, answeredQuestions, timeLimit, onClose, onScore, darkMode, onShowAnswer, answerRevealed, timerValue }) {
            const timerPercent = (timerValue / timeLimit) * 100;
            const isWarning = timerValue <= 5;

            return (
                <div className="fixed inset-0 z-40 flex items-center justify-center p-4 animate-fade-in" style={{ background: 'rgba(0,0,0,0.85)' }}>
                    {/* Wider modal: max-w-5xl instead of max-w-3xl */}
                    <div className={`w-full max-w-5xl rounded-3xl overflow-hidden animate-card-reveal ${darkMode ? 'glass-green-dark' : 'glass-green-light'}`}>
                        {/* Timer bar */}
                        <div className={`h-2 ${darkMode ? 'bg-white/5' : 'bg-gray-200'}`}>
                            <div
                                className={`h-full transition-all duration-1000 ease-linear ${isWarning ? 'bg-red-500' : 'bg-green-500'}`}
                                style={{ width: `${timerPercent}%` }}
                            />
                        </div>

                        <div className="p-6 md:p-8">
                            {/* Timer display */}
                            <div className="flex items-center justify-between mb-6">
                                <div className={`text-4xl md:text-5xl font-mono font-bold ${isWarning ? 'timer-warning' : darkMode ? 'text-white' : 'text-green-800'}`}>
                                    {Math.ceil(timerValue)}
                                </div>
                                <div className={`text-sm font-medium ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>секунд</div>
                            </div>

                            {/* Question */}
                            <div className={`p-6 rounded-2xl mb-6 ${darkMode ? 'bg-white/5' : 'bg-green-50'}`}>
                                <p className={`text-xl md:text-2xl font-bold text-center ${darkMode ? 'text-white' : 'text-green-900'}`}>
                                    {question.text}
                                </p>
                            </div>

                            {/* Show answer button */}
                            {!answerRevealed && (
                                <div className="text-center mb-6">
                                    <button
                                        onClick={() => { soundEngine.playClick(); onShowAnswer(); }}
                                        className="px-8 py-3 bg-amber-500 hover:bg-amber-400 text-white rounded-xl font-bold transition-all duration-200 hover:scale-105"
                                    >
                                        📢 Показать ответ
                                    </button>
                                </div>
                            )}

                            {/* Answer */}
                            {answerRevealed && (
                                <div className={`p-4 rounded-xl mb-6 text-center animate-slide-down ${darkMode ? 'bg-green-500/10 border border-green-500/20' : 'bg-green-50 border border-green-200'}`}>
                                    <p className={`text-sm font-medium mb-1 ${darkMode ? 'text-green-400' : 'text-green-600'}`}>Правильный ответ:</p>
                                    <p className={`text-2xl font-bold ${darkMode ? 'text-green-300' : 'text-green-700'}`}>{question.answer}</p>
                                </div>
                            )}

                            {/* Team scoring - now horizontal for up to 5 teams */}
                            {answerRevealed && (
                                <div className="animate-slide-down">
                                    <p className={`text-sm font-bold text-center mb-4 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                        Оцените ответы команд:
                                    </p>
                                    {/* Horizontal layout for teams */}
                                    <div className="flex flex-nowrap gap-3 overflow-x-auto pb-2">
                                        {teams.map((team, i) => (
                                            <div key={i} className={`flex-shrink-0 flex flex-col items-center p-3 rounded-xl min-w-[140px] ${darkMode ? 'bg-white/5' : 'bg-white/60'
                                                }`}>
                                                <p className={`font-semibold text-center text-sm mb-1 ${darkMode ? 'text-white' : 'text-gray-800'}`}>{team}</p>
                                                <p className={`text-sm mb-3 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{scores[i]} баллов</p>
                                                <div className="flex gap-2">
                                                    <button
                                                        onClick={() => { soundEngine.playCorrect(); onScore(i, 1); }}
                                                        className="flex items-center gap-1 px-3 py-2 bg-green-500 hover:bg-green-400 text-white rounded-lg text-sm font-semibold transition-all duration-200 hover:scale-110"
                                                    >
                                                        <Icons.Check /> +1
                                                    </button>
                                                    <button
                                                        onClick={() => { soundEngine.playWrong(); onScore(i, 0); onClose(); }}
                                                        className={`flex items-center gap-1 px-3 py-2 rounded-lg text-sm font-semibold transition-all duration-200 hover:scale-110 ${darkMode ? 'bg-red-500/20 hover:bg-red-500/30 text-red-400' : 'bg-red-100 hover:bg-red-200 text-red-600'
                                                            }`}
                                                    >
                                                        <Icons.X /> 0
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== GAME PAGE ====================
        function GamePage({ teams, questions, timeLimit, darkMode, onBack, onReset, onFinish, toggleDarkMode }) {
            const [scores, setScores] = useState(teams.map(() => 0));
            const [activeQuestion, setActiveQuestion] = useState(null);
            const [answered, setAnswered] = useState({});
            const [timer, setTimer] = useState(timeLimit);
            const [answerRevealed, setAnswerRevealed] = useState(false);
            const [timerRunning, setTimerRunning] = useState(false);
            const [showWinner, setShowWinner] = useState(false);
            const timerRef = useRef(null);

            const openQuestion = useCallback((q) => {
                if (answered[q.id]) return;
                soundEngine.playClick();
                setActiveQuestion(q);
                setTimer(timeLimit);
                setAnswerRevealed(false);
                setTimerRunning(true);
            }, [answered, timeLimit]);

            useEffect(() => {
                if (!timerRunning || !activeQuestion) return;

                soundEngine.startTicking(1000);
                timerRef.current = setInterval(() => {
                    setTimer(prev => {
                        if (prev <= 1) {
                            soundEngine.stopTicking();
                            soundEngine.playEnd();
                            setTimerRunning(false);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);

                return () => {
                    clearInterval(timerRef.current);
                    soundEngine.stopTicking();
                };
            }, [timerRunning, activeQuestion?.id]);

            const showAnswer = () => {
                setAnswerRevealed(true);
                setTimerRunning(false);
                clearInterval(timerRef.current);
                soundEngine.stopTicking();
            };

            const handleScore = (teamIndex, points) => {
                if (points > 0) {
                    setScores(prev => {
                        const newScores = [...prev];
                        newScores[teamIndex] += points;
                        return newScores;
                    });
                }
                setAnswered(prev => ({ ...prev, [activeQuestion.id]: true }));
                setActiveQuestion(null);
                soundEngine.stopTicking();

                const allAnswered = questions.every(q => answered[q.id] || q.id === activeQuestion.id);
                if (allAnswered && Object.keys(answered).length === questions.length - 1) {
                    setTimeout(() => {
                        setShowWinner(true);
                    }, 500);
                }
            };

            if (showWinner) {
                const maxScore = Math.max(...scores);
                const winnerIndex = scores.indexOf(maxScore);
                const winner = teams[winnerIndex];

                return (
                    <div className={`min-h-screen ${darkMode ? 'wa-bg-dark' : 'wa-bg-light'} flex items-center justify-center p-4`}>
                        {Array.from({ length: 30 }).map((_, i) => (
                            <div
                                key={i}
                                className="confetti"
                                style={{
                                    left: `${Math.random() * 100}%`,
                                    backgroundColor: ['#86efac', '#4ade80', '#22d3ee', '#fbbf24', '#34d399', '#f87171'][Math.floor(Math.random() * 6)],
                                    animationDelay: `${Math.random() * 2}s`,
                                    animationDuration: `${2 + Math.random() * 2}s`,
                                    width: `${6 + Math.random() * 8}px`,
                                    height: `${6 + Math.random() * 8}px`,
                                }}
                            />
                        ))}

                        <div className={`text-center p-8 md:p-12 rounded-3xl animate-bounce-in ${darkMode ? 'glass-green-dark' : 'glass-green-light'}`}>
                            <div className={`inline-block mb-4 ${darkMode ? 'text-amber-400' : 'text-amber-500'}`}>
                                <Icons.Trophy />
                            </div>
                            <h1 className={`text-4xl md:text-6xl font-black mb-4 ${darkMode ? 'text-white' : 'text-green-900'}`}>
                                🎉 Победа!
                            </h1>
                            <p className={`text-2xl md:text-3xl font-bold mb-2 text-gradient`}>{winner}</p>
                            <p className={`text-xl mb-8 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                                {maxScore} {maxScore === 1 ? 'балл' : maxScore < 5 ? 'балла' : 'баллов'}
                            </p>

                            <div className="space-y-2 mb-8">
                                {teams.map((team, i) => (
                                    <div key={i} className={`flex items-center justify-between px-6 py-3 rounded-xl ${i === winnerIndex
                                            ? (darkMode ? 'bg-amber-500/20 border border-amber-500/30' : 'bg-amber-50 border border-amber-200')
                                            : (darkMode ? 'bg-white/5' : 'bg-white/50')
                                        }`}>
                                        <span className={`font-semibold ${i === winnerIndex ? (darkMode ? 'text-amber-300' : 'text-amber-600') : (darkMode ? 'text-white' : 'text-gray-800')}`}>
                                            {i === 0 && '🥇'}{i === 1 && '🥈'}{i === 2 && '🥉'}{i > 2 && `${i + 1}.`} {team}
                                        </span>
                                        <span className={`font-bold text-xl ${darkMode ? 'text-white' : 'text-green-800'}`}>{scores[i]}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="flex gap-3 justify-center">
                                <button
                                    onClick={() => { soundEngine.playClick(); onFinish(); }}
                                    className="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-xl font-bold transition-all duration-200 hover:scale-105"
                                >
                                    На главную
                                </button>
                                <button
                                    onClick={() => { soundEngine.playClick(); onReset(); }}
                                    className={`px-8 py-3 rounded-xl font-bold transition-all duration-200 hover:scale-105 ${darkMode ? 'bg-white/10 text-white hover:bg-white/20' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                        }`}
                                >
                                    <Icons.Reset /> Сброс
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen ${darkMode ? 'wa-bg-dark' : 'wa-bg-light'} p-4 md:p-6`}>
                    <div className="max-w-6xl mx-auto">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-6">
                            <button
                                onClick={() => { soundEngine.playClick(); onBack(); }}
                                className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-200 hover:scale-105 ${darkMode ? 'glass-green-dark text-white' : 'glass-green-light text-green-900'
                                    }`}
                            >
                                <Icons.Back /> Выход
                            </button>
                            <h1 className={`text-2xl font-bold ${darkMode ? 'text-white' : 'text-green-900'}`}>
                                🧠 Акыл Ордо
                            </h1>
                            <div className="flex items-center gap-3">
                                <ThemeToggle darkMode={darkMode} toggleDarkMode={toggleDarkMode} />
                                <button
                                    onClick={() => { soundEngine.playClick(); onReset(); }}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all duration-200 hover:scale-105 ${darkMode ? 'glass-green-dark text-red-400 hover:bg-red-500/10' : 'glass-green-light text-red-500 hover:bg-red-50'
                                        }`}
                                >
                                    <Icons.Reset /> Сброс
                                </button>
                            </div>
                        </div>

                        {/* Scores */}
                        <div className={`rounded-2xl p-4 mb-6 ${darkMode ? 'glass-green-dark' : 'glass-green-light'}`}>
                            <div className="flex flex-wrap gap-3 justify-center">
                                {teams.map((team, i) => (
                                    <div
                                        key={i}
                                        className={`flex items-center gap-3 px-5 py-3 rounded-xl transition-all duration-300 ${darkMode ? 'bg-white/5' : 'bg-white/60'
                                            }`}
                                    >
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold ${darkMode ? 'bg-green-600/30 text-green-300' : 'bg-green-100 text-green-600'
                                            }`}>
                                            {i + 1}
                                        </div>
                                        <div>
                                            <p className={`font-semibold text-sm ${darkMode ? 'text-white' : 'text-gray-800'}`}>{team}</p>
                                            <p className={`text-xl font-bold ${darkMode ? 'text-green-300' : 'text-green-600'}`}>{scores[i]}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Question grid */}
                        <div className="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4">
                            {questions.map((q, idx) => {
                                const isAnswered = answered[q.id];
                                return (
                                    <button
                                        key={q.id}
                                        onClick={() => openQuestion(q)}
                                        disabled={isAnswered}
                                        className={`relative aspect-square rounded-2xl text-2xl md:text-3xl font-bold transition-all duration-300 card-hover ${isAnswered
                                                ? (darkMode ? 'bg-red-500/10 border border-red-500/20 text-red-400 cursor-not-allowed' : 'bg-red-50 border border-red-200 text-red-400 cursor-not-allowed')
                                                : (darkMode ? 'bg-white/10 border border-white/10 text-white hover:bg-green-600 hover:border-green-500' : 'bg-white/80 border border-white text-green-600 hover:bg-green-500 hover:text-white hover:border-green-400')
                                            }`}
                                    >
                                        {isAnswered ? (
                                            <span className="text-3xl">✕</span>
                                        ) : (
                                            <span className="animate-pulse">{idx + 1}</span>
                                        )}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Progress */}
                        <div className="mt-6 text-center">
                            <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                                Отвечено: {Object.keys(answered).length} из {questions.length}
                            </p>
                            <div className={`mt-2 h-2 rounded-full overflow-hidden ${darkMode ? 'bg-white/10' : 'bg-gray-200'}`}>
                                <div
                                    className="h-full bg-gradient-to-r from-green-500 to-emerald-500 rounded-full transition-all duration-500"
                                    style={{ width: `${(Object.keys(answered).length / questions.length) * 100}%` }}
                                />
                            </div>
                        </div>
                    </div>

                    {/* Question modal */}
                    {activeQuestion && (
                        <QuestionCardModal
                            question={activeQuestion}
                            teams={teams}
                            scores={scores}
                            answeredQuestions={answered}
                            timeLimit={timeLimit}
                            onClose={() => { setActiveQuestion(null); soundEngine.stopTicking(); setTimerRunning(false); }}
                            onScore={handleScore}
                            darkMode={darkMode}
                            onShowAnswer={showAnswer}
                            answerRevealed={answerRevealed}
                            timerValue={timer}
                        />
                    )}
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            const [page, setPage] = useState('home'); // home, admin, setup, game
            const [settings, setSettings] = useState(loadSettings);
            const [darkMode, setDarkMode] = useState(true);
            const [teams, setTeams] = useState([]);

            const toggleDarkMode = useCallback(() => {
                soundEngine.playClick();
                setDarkMode(prev => !prev);
            }, []);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
                document.body.style.background = darkMode ? '#0B1A0B' : '#D8E8D0';
            }, [darkMode]);

            const handleStartBattle = () => setPage('setup');
            const handleOpenSettings = () => setPage('admin');
            const handleSaveSettings = (newSettings) => setSettings(newSettings);
            const handleConfirmTeams = (teamNames) => {
                setTeams(teamNames);
                setPage('game');
            };
            const handleBackToHome = () => {
                setPage('home');
                setTeams([]);
            };
            const handleReset = () => {
                setTeams([]);
                setPage('home');
            };

            return (
                <>
                    {page === 'home' && (
                        <HomePage
                            onStart={handleStartBattle}
                            onSettings={handleOpenSettings}
                            darkMode={darkMode}
                            toggleDarkMode={toggleDarkMode}
                        />
                    )}
                    {page === 'admin' && (
                        <AdminPage
                            settings={settings}
                            onSave={handleSaveSettings}
                            onBack={() => { soundEngine.playClick(); setPage('home'); }}
                            darkMode={darkMode}
                            toggleDarkMode={toggleDarkMode}
                        />
                    )}
                    {page === 'setup' && (
                        <TeamSetupModal
                            teamCount={settings.teamCount}
                            onConfirm={handleConfirmTeams}
                            darkMode={darkMode}
                            toggleDarkMode={toggleDarkMode}
                        />
                    )}
                    {page === 'game' && (
                        <GamePage
                            teams={teams}
                            questions={settings.questions}
                            timeLimit={settings.questionTime}
                            darkMode={darkMode}
                            onBack={handleBackToHome}
                            onReset={handleReset}
                            onFinish={handleBackToHome}
                            toggleDarkMode={toggleDarkMode}
                        />
                    )}
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
